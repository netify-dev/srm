name: Build srm Release Binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-13
            label: macos-intel
          - os: macos-15
            label: macos-arm64
          - os: macos-latest
            label: macos-latest
          - os: windows-latest
            label: windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Setup Rtools (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "Rtools should be available via r-lib/actions/setup-r@v2"
        shell: bash

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat

      - name: Extract version from DESCRIPTION
        id: version
        run: |
          version <- read.dcf("DESCRIPTION")[1, "Version"]
          cat(sprintf("version=%s\n", version), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
        shell: Rscript {0}

      - name: Build source package
        run: R CMD build .
        shell: bash

      - name: Build binary package
        run: |
          pkg_file=$(ls -1tr *.tar.gz | tail -n 1)
          R CMD INSTALL --build "$pkg_file"

          platform=${{ matrix.label }}
          for f in *.tgz *.zip *.tar.gz *.tar.bz2; do
            if [ -f "$f" ]; then
              ext="${f##*.}"
              filename=$(basename "$f")
              newname="srm_${{ steps.version.outputs.version }}_${platform}.${ext}"
              mv "$f" "$newname"
              echo "Created: $newname"
            fi
          done
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srm-${{ matrix.label }}-v${{ steps.version.outputs.version }}
          path: |
            *.tgz
            *.zip
            *.tar.gz
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to root of artifacts directory
        run: |
          find artifacts -type f \( -name "*.zip" -o -name "*.tgz" -o -name "*.tar.gz" \) -exec mv {} artifacts/ \;
          ls -la artifacts/
        shell: bash

      - name: Extract version from DESCRIPTION
        id: version
        run: |
          version <- read.dcf("DESCRIPTION")[1, "Version"]
          cat(sprintf("version=%s\n", version), file = Sys.getenv("GITHUB_OUTPUT"), append = TRUE)
        shell: Rscript {0}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "srm v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          body: |
            ## Social Relations Model (SRM) Package v${{ steps.version.outputs.version }}

            This release includes pre-built binaries for multiple platforms.

            ### Installation

            ```r
            # From GitHub:
            devtools::install_github("netify-dev/srm")

            # From binary (Windows .zip):
            install.packages("srm_${{ steps.version.outputs.version }}_windows.zip", repos = NULL, type = "binary")

            # From binary (macOS .tgz):
            install.packages("srm_${{ steps.version.outputs.version }}_macos-arm64.tgz", repos = NULL, type = "binary")

            # From source (.tar.gz):
            install.packages("srm_${{ steps.version.outputs.version }}_linux.tar.gz", repos = NULL, type = "source")
            ```

            ### Features
            - Social Relations Model decomposition (actor, partner, unique effects)
            - Variance partition and covariance components
            - Permutation-based inference
            - Longitudinal and bipartite network support
            - Integration with the netify package ecosystem
            - Simulation for validation and power analysis

          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            artifacts/*.tgz
            artifacts/*.zip
            artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
